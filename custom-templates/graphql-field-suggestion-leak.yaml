id: graphql-field-suggestion-leak

info:
  name: GraphQL Field Suggestion Information Disclosure
  author: BugBountyBot
  severity: medium
  description: Detects GraphQL endpoints that leak internal field names through suggestion errors even when introspection is disabled. Reveals sensitive field names like password, token, secret through Did you mean hints.
  tags: graphql,disclosure,misconfig,api,introspection

http:
  - method: POST
    path:
      - "{{BaseURL}}/graphql"
      - "{{BaseURL}}/api/graphql"
      - "{{BaseURL}}/v1/graphql"
      - "{{BaseURL}}/v2/graphql"
      - "{{BaseURL}}/query"
      - "{{BaseURL}}/api/query"
      - "{{BaseURL}}/api/v1/graphql"
      - "{{BaseURL}}/api/v2/graphql"
      - "{{BaseURL}}/gql"
      - "{{BaseURL}}/api/gql"

    headers:
      Content-Type: application/json

    payloads:
      probe:
        - '{"query":"{ passw0rd_xyz_fake { id } }"}'
        - '{"query":"{ tok3n_xyz_fake { id } }"}'
        - '{"query":"{ s3cr3t_xyz_fake { id } }"}'
        - '{"query":"{ adm1n_xyz_fake { id } }"}'

    body: "{{probe}}"

    attack: pitchfork

    matchers-condition: and
    matchers:
      - type: status
        status:
          - 200

      - type: word
        words:
          - "Did you mean"
        part: body

      - type: word
        negative: true
        condition: or
        words:
          - "<html"
          - "<!DOCTYPE"
          - "Not Found"
          - "404"
        part: body

    extractors:
      - type: regex
        name: suggested_fields
        part: body
        regex:
          - '"Did you mean [^"]+"'
